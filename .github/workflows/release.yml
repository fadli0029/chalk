name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: astral-sh/setup-uv@v7

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish dist/*

  smoke-test:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install from PyPI and verify CLI
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke chalk-pypi
          /tmp/smoke/bin/chalk --help
          /tmp/smoke/bin/chalk-extract --help
